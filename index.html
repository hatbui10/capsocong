<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Highlight theo d</title>

<style>
body {
    background: #020617;
    color: white;
    text-align: center;
    font-family: Arial;
}

input {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: none;
}

.result {
    margin-top: 10px;
    font-size: 18px;
    color: #22c55e;
}

.grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, 40px);
    gap: 6px;
    justify-content: center;
}

.cell {
    width: 40px;
    height: 40px;
    background: #1e293b;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
}

.yellow { background: #facc15; color: black; }
.blue { background: #38bdf8; }

.blink {
    animation: blink 0.6s infinite;
}

@keyframes blink {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.3; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<h2>Phân tích vị trí d 😵‍💫</h2>

<input type="file" id="fileInput">
<input type="number" id="d" placeholder="Nhập d">

<div class="result">
Max đứng im: <span id="maxStop">0</span>
</div>

<div class="grid" id="grid"></div>

<script>
let data = [];

// load file
document.getElementById("fileInput").addEventListener("change", function(e) {
    let file = e.target.files[0];
    if (!file) return;

    let reader = new FileReader();

    reader.onload = function(e) {
        let text = e.target.result;
        data = text.replace(/[^0-9]/g, "").split("");

        let d = parseInt(document.getElementById("d").value) || 1;
        render(data, d);

        localStorage.setItem("data", JSON.stringify(data));
    };

    reader.readAsText(file);
});

// auto khi đổi d
document.getElementById("d").addEventListener("input", function() {
    let d = parseInt(this.value);
    if (!d || data.length === 0) return;

    render(data, d);
    localStorage.setItem("d", d);
});

function render(arr, d) {
    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    let cells = [];
    let states = []; // true = blink

    // tạo grid
    arr.forEach((num) => {
        let div = document.createElement("div");
        div.className = "cell";
        div.innerText = num;

        cells.push(div);
        grid.appendChild(div);
    });

    // xử lý vị trí d
    for (let i = 0; i < arr.length; i++) {

        if (i % d === 0) {
            let val = parseInt(arr[i]);

            // tô màu
            if (val < 5) cells[i].classList.add("yellow");
            else cells[i].classList.add("blue");

            let isBlink = false;

            // check hàng xóm bên phải
            if (i + 1 < arr.length) {
                let current = val < 5 ? "B" : "A";
                let next = parseInt(arr[i + 1]) < 5 ? "B" : "A";

                if (current === next) {
                    cells[i].classList.add("blink");
                    isBlink = true;
                }
            }

            states.push(isBlink);
        }
    }

    // ===== tính đoạn đứng im dài nhất =====
   // ===== tìm đoạn đứng im dài nhất =====
let maxStop = 0;
let currentStop = 0;
let startIndex = -1;

let bestStart = -1;

let started = false;

for (let i = 0; i < states.length; i++) {

    if (states[i]) {
        if (started && currentStop > maxStop) {
            maxStop = currentStop;
            bestStart = startIndex;
        }
        started = true;
        currentStop = 0;
        startIndex = i + 1;
    } else {
        if (started) {
            if (currentStop === 0) startIndex = i;
            currentStop++;
        }
    }
}

// hiển thị số
document.getElementById("maxStop").innerText = maxStop;

// ===== tô đỏ đoạn max =====
if (bestStart !== -1 && maxStop > 0) {

    // map từ index trong states → index thật trong arr
    let dIndexes = [];

    for (let i = 0; i < arr.length; i++) {
        if (i % d === 0) {
            dIndexes.push(i);
        }
    }

    for (let i = bestStart; i < bestStart + maxStop; i++) {
        let realIndex = dIndexes[i];
        cells[realIndex].style.background = "red";
        cells[realIndex].style.color = "white";
    }
}
}


// load lại
window.onload = function() {
    let savedData = JSON.parse(localStorage.getItem("data") || "[]");
    let savedD = localStorage.getItem("d");

    if (savedData.length > 0) data = savedData;

    if (savedD) {
        document.getElementById("d").value = savedD;
        render(data, parseInt(savedD));
    }
}
</script>

</body>
</html>
